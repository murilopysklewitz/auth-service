spring:
  profile: docker
  datasource:
    url: jdbc:postgresql://db:5432/postgres
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    DRIVER_CLASS_NAME: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 1500000
  refresh-expiration: 604800000