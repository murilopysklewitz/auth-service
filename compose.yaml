services:

  api:
    build: ./
    container_name: "auth_service"
    ports:
      - '3000:8080'
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - rabbitmq
    env_file:
      - .env
    networks:
      - secure_api_bank
  postgres:
    container_name: "auth_db"
    image: postgres:15
    environment:
      POSTGRES_DB: db_name
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
    ports:
      - '5432'
    networks:
      - secure_api_bank

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
    ports:
      - '5672'
    networks:
        - secure_api_bank
networks:
  secure_api_bank:
    driver: bridge